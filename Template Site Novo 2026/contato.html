<section class="home">

    <div class="home-content">

        <h1>Contato</h1>

        <h3>Vamos conversar sobre seu projeto</h3>

        <p>
            Entre em contato para consultoria em Cloud, DevOps ou Cibersegurança.
        </p>

        <form action="https://formsubmit.co/warlei@warlei.com.br" method="post">

            <input type="text" name="name" placeholder="Seu Nome" required><br><br>
            <input type="email" name="email" placeholder="Seu E-mail" required><br><br>
            <input type="text" name="subject" placeholder="Assunto" required><br><br>

            <textarea name="message" cols="30" rows="6" placeholder="Sua mensagem"></textarea><br><br>

            <input type="hidden" name="_next" value="https://warlei.com.br/obrigado.html">

            <button type="submit" class="btn">Enviar Mensagem</button>

        </form>

    </div>

    <div class="home-img">
        <img src="images/home4.png" alt="Contato">
    </div>
